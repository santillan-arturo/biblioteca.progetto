<div class="container" style="padding: 20px; font-family: sans-serif;">
  
  <a routerLink="/" style="color: #007bff; text-decoration: none; font-weight: bold;">← Torna ai Generi</a>

  <h1 style="margin-top: 20px; color: #333;">Libri Disponibili</h1>

  <div style="margin-bottom: 30px;">
    <input type="text" 
           [(ngModel)]="testoRicerca" 
           (input)="caricaLibri()" 
           placeholder="Cerca un libro per titolo..." 
           style="width: 100%; max-width: 400px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
  </div>

  <div *ngIf="listaLibri.length === 0" style="color: #777; font-style: italic;">
    Nessun libro trovato per questo genere o criterio di ricerca.
  </div>

  <table *ngIf="listaLibri.length > 0" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
    <thead>
      <tr style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6; text-align: left;">
        <th style="padding: 12px;">Titolo</th>
        <th style="padding: 12px;">Autore</th>
        <th style="padding: 12px;">Anno</th>
        <th style="padding: 12px;">Azione</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let libro of listaLibri" style="border-bottom: 1px solid #dee2e6;">
        <td style="padding: 12px; font-weight: bold;">{{ libro.Titolo }}</td>
        <td style="padding: 12px;">{{ libro.Autore_Nome }} {{ libro.Autore_Cognome }}</td>
        <td style="padding: 12px;">{{ libro.Anno_Pubblicazione }}</td>
        <td style="padding: 12px;">
          <a [routerLink]="['/libro', libro.id_libri]" 
             style="color: white; background-color: #28a745; padding: 6px 12px; text-decoration: none; border-radius: 4px; font-size: 14px; display: inline-block;">
            Vedi Dettaglio
          </a>
        </td>
      </tr>
    </tbody>
  </table>

</div>
