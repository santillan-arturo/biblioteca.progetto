<div class="form-container">
  <h2>✍️ Inserisci un Nuovo Autore</h2>
  
  <form (ngSubmit)="inviaForm()">
    
    <div class="form-group">
      <label for="nome">Nome:</label>
      <input type="text" id="nome" name="nome" [(ngModel)]="nuovoAutore.Nome" required>
    </div>

    <div class="form-group">
      <label for="cognome">Cognome:</label>
      <input type="text" id="cognome" name="cognome" [(ngModel)]="nuovoAutore.Cognome" required>
    </div>

    <div class="form-group">
      <label for="nazionalita">Nazionalità:</label>
      <input type="text" id="nazionalita" name="nazionalita" [(ngModel)]="nuovoAutore.Nazionalita" required>
    </div>

    <button type="submit">Salva Autore</button>
  </form>
</div>
